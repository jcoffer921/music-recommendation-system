{% extends "base.html" %}

{% block title %}Get Music Recommendations{% endblock %}

{% block content %}
<div class="hero">
    <h2>Discover Your Perfect Sound</h2>
    <p>Answer a few questions and get personalized music recommendations</p>
</div>

<div class="form-container">
    <form id="recommendationForm">
        <fieldset>
            <legend>Your Music Preferences</legend>
            
            <div class="form-group">
                <label for="mood">What's your current mood?</label>
                <input type="text" id="mood" name="mood" placeholder="e.g., happy, energetic, calm" required>
            </div>

            <div class="form-group">
                <label for="genre">Favorite music genre?</label>
                <input type="text" id="genre" name="genre" placeholder="e.g., rock, pop, jazz, hip-hop" required>
            </div>

            <div class="form-group">
                <label for="artist">Favorite artist or band?</label>
                <input type="text" id="artist" name="artist" placeholder="e.g., The Beatles, Drake..." required>
            </div>

            <div class="form-group">
                <label for="energy">Desired energy level (1-10)?</label>
                <input type="range" id="energy" name="energy" min="1" max="10" value="5">
                <span id="energyValue">5</span>/10
            </div>

            <div class="form-group">
                <label for="vibe">What's the vibe?</label>
                <input type="text" id="vibe" name="vibe" placeholder="e.g., workout, studying, party, chill" required>
            </div>

            <button type="submit" class="btn-primary">Get Recommendations</button>
        </fieldset>
    </form>
</div>

<div id="results" class="results-container" style="display: none;">
    <div id="summary" class="summary-section"></div>
    <div id="recommendations" class="recommendations-section"></div>
</div>

<div id="loading" class="loading" style="display: none;">
    <div class="spinner"></div>
    <p>Getting your recommendations...</p>
</div>

<div id="error" class="error-message" style="display: none;"></div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
{% endblock %}
